    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - League Rayo de Luna</title>
</head>
	<body>
		<header>
			<img src="images/logo.png" class="logosize"  alt="LogoBB">
			<h1>Registro</h1>
			<img src="images/logoliga.png" class="logosize6x6" alt="logoliga">
		</header>
		<div class="container">
			<nav>
				<ul>
					<li><a href="index.html" class="nuffle yellow menu">Principal</a></li>
					<li><a href="reglas.html" class="nuffle yellow menu">Bases</a></li>
					<li><a href="clasificacion.html" class="nuffle yellow menu">Clasificación</li>
					<li><a href="pairings.html" class="nuffle yellow menu">Emparejamientos</a></li>
					<li class="nuffle yellow menu">Registro</a></li>
				</ul>
				<img src="images/ganadores.PNG" class="sideimg" alt="ganadores">
			</nav>
			<main>
				<br>
				<form class="formulario" id="formRegistro">
				  <label>Nombre de usuario</label>
				  <input type="text" id="username" required>

				  <label>Nombre del equipo</label>
				  <input type="text" id="equipo" required>

				  <label>Raza</label>
				  <input type="text" id="raza" required>

				  <label>Contraseña</label>
				  <input type="password" id="password" required>

				  <button type="submit">Registrarse</button>
				</form>

				<div id="mensaje"></div>
				<div class="hide nuffle red centered big" id="noregistros">Torneo en curso. Registro no permitido</div>
			</main>
		</div>
		<div id="overlay" class="hide">
		  <div class="overlay-content nuffle red big">
			Cargando...
		  </div>
		</div>
		<script>
			const CONFIG = "Config";
			const SHEET_ID = "1O7yVvVJcC2afswIFlYi87J6JCgKaw-Sa18yuRBCoSdI";
			async function fetchSheet(sheetName) {
			  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${sheetName}`;
			  const res = await fetch(url);
			  const text = await res.text();
			  return JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
			}

			async function sha256(texto) {
			  const encoder = new TextEncoder();
			  const data = encoder.encode(texto);
			  const hash = await crypto.subtle.digest("SHA-256", data);
			  return Array.from(new Uint8Array(hash))
				.map(b => b.toString(16).padStart(2, "0"))
				.join("");
			}
			const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzYL6nJM9l0-Jptg5D0J73ZSBnY2xKG_OlUXE09mraH3BvWU7qCaBfFBjPg1k4i0LL0Ww/exec";



			document.getElementById("formRegistro").addEventListener("submit", async (e) => {
			  e.preventDefault();
			mostrarOverlay();
			  const username = document.getElementById("username").value.trim();
			  const equipo   = document.getElementById("equipo").value.trim();
			  const raza     = document.getElementById("raza").value.trim();
			  const password = document.getElementById("password").value;

			  const password_hash = await sha256(password);

			  const data = {
				action: "registrar",
				username,
				equipo,
				raza,
				password_hash
			  };

			  const formData = new FormData();
			  formData.append("data", JSON.stringify(data));

			  const res  = await fetch(URL_SCRIPT, {
				method: "POST",
				body: formData
			  });

			  const text = await res.text();
			  let json;
			  try {
				json = JSON.parse(text);
			  } catch (e) {
				json = { ok: false, error: "Respuesta no válida: " + text };
			  }
			ocultarOverlay();
			alert("Resultado: " + json.mensaje || json.error);
			  document.getElementById("mensaje").innerText = json.mensaje || json.error;
			});

			function mostrarOverlay() {
			  document.getElementById("overlay").classList.remove("hide");
			}

			function ocultarOverlay() {
			  document.getElementById("overlay").classList.add("hide");
			}

			function mostrarNoRegistro() {
			  document.getElementById("noregistros").classList.remove("hide");
			}

			function ocultarNoRegistro() {
			  document.getElementById("noregistros").classList.add("hide");
			}

			function mostrarFormulario() {
			  document.getElementById("formRegistro").classList.remove("hide");
			}

			function ocultarFormulario() {
			  document.getElementById("formRegistro").classList.add("hide");
			}
			
			document.addEventListener("DOMContentLoaded", async () => {
				mostrarOverlay();
			  const jsonConfig = await fetchSheet(CONFIG);
			  const rowsConfig = jsonConfig.table.rows;

			  const registroActivo = rowsConfig[3].c[1]?.v; // B1
			  if(registroActivo===1){
				mostrarFormulario();
				ocultarNoRegistro();
			  }else{
				ocultarFormulario();
				mostrarNoRegistro();
			  }
				ocultarOverlay();
			});
		</script>
	</body>
</html>
