    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificación - League Rayo de Luna</title>
</head>
	<body>
		<header>
			<img src="images/logo.png" class="logosize"  alt="LogoBB">
			<h1>Clasificación</h1>
			<img src="images/logoliga.png" class="logosize6x6" alt="logoliga">
		</header>
		<div class="container">
			<nav>
				<ul>
					<li><a href="index.html" class="nuffle yellow menu">Principal</a></li>
					<li><a href="reglas.html" class="nuffle yellow menu">Bases</a></li>
					<li><a href="clasificacion.html" class="nuffle yellow menu">Clasificación</li>
					<li><a href="pairings.html" class="nuffle yellow menu">Emparejamientos</a></li>
					<li class="nuffle yellow menu">Registro</a></li>
				</ul>
				<img src="images/ganadores.PNG" class="sideimg" alt="ganadores">
			</nav>
			<main>
				<br>
				<form id="formRegistro">
				  <label class="nuffle red">Nombre de usuario</label>
				  <input type="text" id="username" required>

				  <label class="nuffle red">Nombre del equipo</label>
				  <input type="text" id="equipo" required>

				  <label class="nuffle red">Raza</label>
				  <input type="text" id="raza" required>

				  <label class="nuffle red">Contraseña</label>
				  <input type="password" id="password" required>

				  <button type="submit">Registrarse</button>
				</form>

				<div id="mensaje"></div>

			</main>
		</div>
		<script>
			async function sha256(texto) {
			  const encoder = new TextEncoder();
			  const data = encoder.encode(texto);
			  const hash = await crypto.subtle.digest("SHA-256", data);
			  return Array.from(new Uint8Array(hash))
				.map(b => b.toString(16).padStart(2, "0"))
				.join("");
			}
			const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbx-4Jptg5vzfg3dfGIjc73RAiMmsrEu5Hm2dmUKBzIAyLVePRANWJEGhLAbmSVR2Q74rw/exec";

			document.getElementById("formRegistro").addEventListener("submit", async (e) => {
			  e.preventDefault();

			  const username = document.getElementById("username").value.trim();
			  const equipo = document.getElementById("equipo").value.trim();
			  const raza = document.getElementById("raza").value.trim();
			  const password = document.getElementById("password").value;

			  const password_hash = await sha256(password);

			  const data = {
				action: "registrar",
				username,
				equipo,
				raza,
				password_hash
			  };

			  const res = await fetch(URL_SCRIPT, {
				method: "POST",
				body: JSON.stringify(data)
			  });

			  const json = await res.json();

			  document.getElementById("mensaje").innerText = json.mensaje || json.error;
			});

		</script>
	</body>
</html>
