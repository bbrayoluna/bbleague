<div id="form-wrapper" class="hide">
  <h2>Enviar resultado</h2>

  <form id="resultadoForm">

    <label for="jornada">Jornada</label>
    <input type="text" id="jornada" name="entry.1027995851" readonly>

    <label for="equipoA">Equipo A</label>
    <select id="equipoA" name="entry.2088777498"></select>


    <label for="equipoB">Equipo B</label>
    <select id="equipoB" name="entry.709949618"></select>


    <label for="tdA">Touchdowns A</label>
    <input type="number" id="tdA" name="entry.296439806" min="0">

    <label for="tdB">Touchdowns B</label>
    <input type="number" id="tdB" name="entry.1334922532" min="0">

    <label for="bajasA">Bajas equipo A</label>
    <input type="number" id="bajasA" name="entry.159054365" min="0">

    <label for="bajasB">Bajas equipo B</label>
    <input type="number" id="bajasB" name="entry.370521934" min="0">
<input type="hidden" name="fvv" value="1">
<input type="hidden" name="draftResponse" value="[]">
<input type="hidden" name="pageHistory" value="0">

    <button type="submit">Enviar resultado</button>

<script>
const SHEET_ID = "1O7yVvVJcC2afswIFlYi87J6JCgKaw-Sa18yuRBCoSdI";
const RANKING_SUIZO = "rankingSuizo";
const CONFIG = "Config";

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${sheetName}`;
  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
}

async function cargarEquipos() {
  const json = await fetchSheet(RANKING_SUIZO);
  const rows = json.table.rows;
  const equipos = rows.map(r => r.c?.[0]?.v).filter(Boolean);

  const selA = document.getElementById("equipoA");
  const selB = document.getElementById("equipoB");

  equipos.forEach(eq => {
    const optA = document.createElement("option");
    optA.value = eq;
    optA.textContent = eq;
    selA.appendChild(optA);

    const optB = document.createElement("option");
    optB.value = eq;
    optB.textContent = eq;
    selB.appendChild(optB);
  });
}

async function cargarConfig() {
  const json = await fetchSheet(CONFIG);
  const rows = json.table.rows;

  const jornada = rows[0].c[1]?.v; // B1
  const abierto = rows[1].c[1]?.v; // B2

  document.getElementById("jornada").value = jornada;

  const formWrapper = document.getElementById("form-wrapper");
  const cerradoBox = document.getElementById("cerrado");

  if (abierto === 1) {
    formWrapper.classList.remove("hide");
    cerradoBox.classList.add("hide");
  } else {
    formWrapper.classList.add("hide");
    cerradoBox.classList.remove("hide");
  }
}


function validarFormulario() {
  const a = document.getElementById("equipoA").value;
  const b = document.getElementById("equipoB").value;

  if (a === b) {
    alert("Equipo A y Equipo B deben ser distintos.");
    return false;
  }
  return true;
}

document.getElementById("resultadoForm").addEventListener("submit", async function(e) {
  e.preventDefault(); // Evita la redirección

  const equipoA = document.getElementById("equipoA").value.trim();
  const equipoB = document.getElementById("equipoB").value.trim();
  const tdA = document.getElementById("tdA").value;
  const tdB = document.getElementById("tdB").value;
  const bajasA = document.getElementById("bajasA").value;
  const bajasB = document.getElementById("bajasB").value;

  // VALIDACIONES
  if (!equipoA || !equipoB) {
    alert("Debes seleccionar ambos equipos.");
    return;
  }

  if (equipoA === equipoB) {
    alert("Equipo A y Equipo B deben ser distintos.");
    return;
  }

  if (tdA === "" || tdB === "" || bajasA === "" || bajasB === "") {
    alert("Todos los campos numéricos son obligatorios.");
    return;
  }

  if (tdA < 0 || tdB < 0 || bajasA < 0 || bajasB < 0) {
    alert("Los valores numéricos no pueden ser negativos.");
    return;
  }

  // Enviar datos
  const form = e.target;
  const data = new FormData(form);

  const url = "https://docs.google.com/forms/d/e/1FAIpQLSebNCAX2Fepm0uHFZHkzoCfAGJH_JBYTA4jxu45SHkIR0drIw/formResponse";

  await fetch(url, {
    method: "POST",
    mode: "no-cors",
    body: data
  });

  // Mensaje de éxito
  const mensaje = document.getElementById("mensaje");
  mensaje.textContent = "Resultado enviado correctamente ✔";
  mensaje.style.color = "#4a8";

  // Opcional: limpiar campos numéricos
  document.getElementById("tdA").value = "";
  document.getElementById("tdB").value = "";
  document.getElementById("bajasA").value = "";
  document.getElementById("bajasB").value = "";
});

document.addEventListener("DOMContentLoaded", async () => {
  await cargarEquipos();
  await cargarConfig();
});
</script>
