<script>
async function sha256(texto) {
  const encoder = new TextEncoder();
  const data = encoder.encode(texto);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hash))
	.map(b => b.toString(16).padStart(2, "0"))
	.join("");
}
const SHEET_ID = "1O7yVvVJcC2afswIFlYi87J6JCgKaw-Sa18yuRBCoSdI";
const RANKING_SUIZO = "rankingSuizo";
const CONFIG = "Config";

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${sheetName}`;
  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
}

async function cargarEquipos() {
  const jsonConfig = await fetchSheet(CONFIG);
  const rowsConfig = jsonConfig.table.rows;

  const jornada = rowsConfig[0].c[1]?.v; // B1
  document.getElementById("jornada").value = jornada;
  
  const json = await fetchSheet(RANKING_SUIZO);
  const rows = json.table.rows;
  const equipos = rows.map(r => r.c?.[0]?.v).filter(Boolean);

  const selA = document.getElementById("equipoA");
  const selB = document.getElementById("equipoB");

  equipos.forEach(eq => {
    const optA = document.createElement("option");
    optA.value = eq;
    optA.textContent = eq;
    selA.appendChild(optA);

    const optB = document.createElement("option");
    optB.value = eq;
    optB.textContent = eq;
    selB.appendChild(optB);
  });
}


const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzYL6nJM9l0-Jptg5D0J73ZSBnY2xKG_OlUXE09mraH3BvWU7qCaBfFBjPg1k4i0LL0Ww/exec";


function validarFormulario() {
  const a = document.getElementById("equipoA").value;
  const b = document.getElementById("equipoB").value;

  if (a === b) {
    alert("Equipo A y Equipo B deben ser distintos.");
    return false;
  }
  return true;
}

document.getElementById("resultadoForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const jornada=document.getElementById("jornada").value;
  const equipoA=document.getElementById("equipoA").value;
  const equipoB=document.getElementById("equipoB").value;
  const tdA=document.getElementById("tdA").value;
  const tdB=document.getElementById("tdB").value;
  const bajasA=document.getElementById("bajasA").value;
  const bajasB=document.getElementById("bajasB").value;
  const data = {
				action: "resultado",
				jornada,
				equipoA,
				equipoB,
				tdA,
				tdB,
				bajasA,
				bajasB
			  };

			  const formData = new FormData();
			  formData.append("data", JSON.stringify(data));
  await fetch(URL_SCRIPT, {
    method: "POST",
    body: formData
  });
  
  document.getElementById("mensaje").textContent = "Resultado enviado correctamente ✔";
});



document.getElementById("formLogin").addEventListener("submit", async (e) => {
  e.preventDefault();
 mostrarOverlay();
  const username = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPass").value;

  const password_hash = await sha256(password);

  const data = {
    action: "login",
    username,
    password_hash,
    user_agent: navigator.userAgent
  };

  const formData = new FormData();
  formData.append("data", JSON.stringify(data));

  const res = await fetch(URL_SCRIPT, {
    method: "POST",
    body: formData
  });

  const json = await res.json();
	ocultarOverlay();
  if (json.ok) {
    // Guardar sesión
    localStorage.setItem("token", json.token);
    localStorage.setItem("user_id", json.user_id);
	alert("Sesión iniciada correctamente");
    document.getElementById("loginMensaje").innerText = "Sesión iniciada";

    mostrarResultados();
  } else {
	alert("Error: " + json.error);
    document.getElementById("loginMensaje").innerText = json.error;
  }
});

async function mostrarResultados() {
  await cargarEquipos();
  document.getElementById("loginSection").classList.add("hide");
  document.getElementById("form-wrapper").classList.remove("hide");
}

function mostrarLogin() {
  document.getElementById("loginSection").classList.remove("hide");
  document.getElementById("form-wrapper").classList.add("hide");
}

document.addEventListener("DOMContentLoaded", async () => {
  const token = localStorage.getItem("token");
  const user_id = localStorage.getItem("user_id");

  if (!token) {
    mostrarLogin();
    return;
  }

  const data = {
    action: "validar",
    token,
    user_id
  };

  const formData = new FormData();
  formData.append("data", JSON.stringify(data));

  const res = await fetch(URL_SCRIPT, {
    method: "POST",
    body: formData
  });

  const json = await res.json();

  if (json.ok) {
    await mostrarResultados();
  } else {
    localStorage.removeItem("token");
    localStorage.removeItem("user_id");
    mostrarLogin();
  }
});

function mostrarOverlay() {
  document.getElementById("overlay").classList.remove("hide");
}

function ocultarOverlay() {
  document.getElementById("overlay").classList.add("hide");
}

</script>
