<body>

			<main>
				<div id="emparejamientos"></div>
    <h2 class="nuffle red big">Resultados previos</h2>
    <div id="resultados">
      <!-- JS rellenará aquí los resultados por jornada -->
    </div>
	<div id="nextMatch" class="hide">
		<h2 class="nuffle red big">Próximos emparejamientos</h2>
		<table id="pairings">
		  <thead>
			<tr>
			  <th>Mesa</th>
			  <th>Equipo 1</th>
			  <th>Equipo 2</th>
			</tr>
		  </thead>
		  <tbody>
			<!-- JS rellenará aquí los pairings -->
		  </tbody>
		</table>

  </div>

  <script>
    const SHEET_ID = "1O7yVvVJcC2afswIFlYi87J6JCgKaw-Sa18yuRBCoSdI";
    const RANKING_SUIZO = "rankingSuizo";
    const RESULTADOS = "Resultados";
    const CONFIG = "Config";

    async function fetchSheet(sheetName) {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}`;
      const res = await fetch(url);
      const text = await res.text();
      return JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
    }

async function loadResultados() {
  const json = await fetchSheet(RESULTADOS);
  const rows = json.table.rows;

  const jornadas = {};

  rows.forEach(r => {
    if (!r.c) return;

    const jornada = r.c[1]?.v;   // Columna B
    const equipoA = r.c[2]?.v;   // Columna C
    const equipoB = r.c[3]?.v;   // Columna D
    const tdA = r.c[4]?.v;       // Columna E
    const tdB = r.c[5]?.v;       // Columna F

    if (!jornada) return;

    if (!jornadas[jornada]) jornadas[jornada] = [];
    jornadas[jornada].push({ equipoA, equipoB, tdA, tdB });
  });

  const cont = document.getElementById("resultados");
  cont.innerHTML = "";

  Object.keys(jornadas)
    .sort((a, b) => Number(a) - Number(b))
    .forEach(j => {

      // Cabecera plegable
      const header = document.createElement("div");
      header.className = "jornada-header";
      header.textContent = `Jornada ${j} ▼`;

      // Contenedor plegable
      const contenido = document.createElement("div");
      contenido.className = "jornada-contenido";

      // Tabla de resultados
      const table = document.createElement("table");
      table.innerHTML = `
        <thead>
          <tr>
            <th>Equipo A</th>
            <th>TD</th>
            <th>TD</th>
            <th>Equipo B</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;

      const tbody = table.querySelector("tbody");

      jornadas[j].forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${p.equipoA ?? ""}</td>
          <td>${p.tdA ?? ""}</td>
          <td>${p.tdB ?? ""}</td>
          <td>${p.equipoB ?? ""}</td>
        `;
        tbody.appendChild(tr);
      });

      contenido.appendChild(table);

      // Evento de plegado/desplegado
      header.addEventListener("click", () => {
        const visible = contenido.style.display === "block";
        contenido.style.display = visible ? "none" : "block";
        header.textContent = visible ? `Jornada ${j} ▼` : `Jornada ${j} ▲`;
      });

      cont.appendChild(header);
      cont.appendChild(contenido);
    });
}

async function loadPairings() {
  // 0. Leer config
  const configJson = await fetchSheet(CONFIG);
  const configRows = configJson.table.rows;
  const enabled = configRows[2].c[1]?.v; // B3
  console.log('enabled',enabled);
  if(enabled === 1){
	console.log('visi',enabled);
	const nextMatch = document.getElementById("nextMatch");
	nextMatch.classList.remove("hide");
  }else{
	return;
  }
  
  // 1. Leer ranking suizo
  const rankingJson = await fetchSheet(RANKING_SUIZO);
  const rankingRows = rankingJson.table.rows;

  const teams = rankingRows
    .map(r => (r.c && r.c[0] ? r.c[0].v : null))
    .filter(Boolean);

  // 2. Leer resultados para saber qué partidos ya se jugaron
  const resJson = await fetchSheet(RESULTADOS);
  const resRows = resJson.table.rows;

  // Set de partidos jugados (sin orden: "A|B" == "B|A")
  const played = new Set();

  resRows.forEach(r => {
    if (!r.c) return;
    const A = r.c[2]?.v;
    const B = r.c[3]?.v;
    if (A && B) {
      const key = [A, B].sort().join("|");
      played.add(key);
    }
  });

  // 3. Emparejar evitando repetidos
  const used = new Set();
  const pairings = [];

  for (let i = 0; i < teams.length; i++) {
    const t1 = teams[i];
    if (used.has(t1)) continue;

    let t2 = null;

    // Buscar el primer rival disponible que NO haya jugado contra t1
    for (let j = i + 1; j < teams.length; j++) {
      const candidate = teams[j];
      if (used.has(candidate)) continue;

      const key = [t1, candidate].sort().join("|");
      if (!played.has(key)) {
        t2 = candidate;
        break;
      }
    }

    // Si no se encuentra rival, asignar BYE
    if (!t2) {
      pairings.push([t1, "BYE"]);
      used.add(t1);
      continue;
    }

    pairings.push([t1, t2]);
    used.add(t1);
    used.add(t2);
  }

  // 4. Pintar en la tabla
  const tbody = document.querySelector("#pairings tbody");
  tbody.innerHTML = "";

  let mesa = 1;
  pairings.forEach(([a, b]) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${mesa++}</td>
      <td>${a}</td>
      <td>${b}</td>
    `;
    tbody.appendChild(tr);
  });
}

    document.addEventListener("DOMContentLoaded", async () => {
      await loadResultados();
      await loadPairings();
    });
  </script>
</body>
