  <script>
    const SHEET_ID = "1O7yVvVJcC2afswIFlYi87J6JCgKaw-Sa18yuRBCoSdI";

    async function fetchSheet(sheetName) {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}`;
      const res = await fetch(url);
      const text = await res.text();
      return JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
    }

async function loadResultados(rows) {
  const valor = rows?.[0]?.c?.[0]?.v ?? "";

	if (valor === "ignorar") {
		return;
	} 

  const jornadas = {};

  rows.forEach(r => {
    if (!r.c) return;

    const jornada = r.c[1]?.v;   // Columna B
    const equipoA = r.c[2]?.v;   // Columna C
    const equipoB = r.c[3]?.v;   // Columna D
    const tdA = r.c[4]?.v;       // Columna E
    const tdB = r.c[5]?.v;       // Columna F

    if (!jornada) return;

    if (!jornadas[jornada]) jornadas[jornada] = [];
    jornadas[jornada].push({ equipoA, equipoB, tdA, tdB });
  });

  const cont = document.getElementById("resultados");
  cont.innerHTML = "";

  Object.keys(jornadas)
    .sort((a, b) => Number(a) - Number(b))
    .forEach(j => {

      // Cabecera plegable
      const header = document.createElement("div");
      header.className = "jornada-header";
      header.textContent = `Jornada ${j} ▼`;

      // Contenedor plegable
      const contenido = document.createElement("div");
      contenido.className = "jornada-contenido";

      // Tabla de resultados
      const table = document.createElement("table");
      table.innerHTML = `
        <thead>
          <tr>
            <th>Equipo A</th>
            <th>TD</th>
            <th>TD</th>
            <th>Equipo B</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;

      const tbody = table.querySelector("tbody");

      jornadas[j].forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${p.equipoA ?? ""}</td>
          <td>${p.tdA ?? ""}</td>
          <td>${p.tdB ?? ""}</td>
          <td>${p.equipoB ?? ""}</td>
        `;
        tbody.appendChild(tr);
      });

      contenido.appendChild(table);

      // Evento de plegado/desplegado
      header.addEventListener("click", () => {
        const visible = contenido.style.display === "block";
        contenido.style.display = visible ? "none" : "block";
        header.textContent = visible ? `Jornada ${j} ▼` : `Jornada ${j} ▲`;
      });

      cont.appendChild(header);
      cont.appendChild(contenido);
    });
}

// Construye un id único de pareja
function pairId(row) {
  return `${row.c[0].v}::${row.c[1].v}`;
}

// Mapa jugador -> id de pareja
function buildPlayerToPairMap(rankingRows) {
  const map = new Map();
  for (const row of rankingRows) {
    const id = pairId(row);
    map.set(row.c[0].v, id);
    map.set(row.c[1].v, id);
  }
  return map;
}

// Conjunto de emparejamientos ya jugados (por pareja)
function buildPlayedPairsSet(rankingRows, resultadosRows) {
  const playerToPair = buildPlayerToPairMap(rankingRows);
  const played = new Set();

  for (const r of resultadosRows) {
    const pairA = playerToPair.get(r.EquipoA);
    const pairB = playerToPair.get(r.EquipoB);
    if (!pairA || !pairB || pairA === pairB) continue;

    const key = [pairA, pairB].sort().join(" vs ");
    played.add(key);
  }

  return played;
}

// Orden suizo usando solo RankingSuizo (ya trae los valores)
function sortSwiss(rankingRows) {
  return [...rankingRows].sort((a, b) =>
    b.Puntos        - a.Puntos        ||
    b.TDDiff        - a.TDDiff        ||
    b.TDPlus        - a.TDPlus        ||
    b.BajasPlus     - a.BajasPlus     ||
    b.PorcVictorias - a.PorcVictorias ||
    b.OMW           - a.OMW           ||
    b.SOS           - a.SOS           ||
    b.SOSOS         - a.SOSOS
  );
}

// Generar emparejamientos suizos evitando repetidos
function generarEmparejamientos(rankingRows, resultadosRows) {
  const ordenadas = sortSwiss(rankingRows);
  const played = buildPlayedPairsSet(rankingRows, resultadosRows);

  const usadas = new Set();
  const emparejamientos = [];

  const idMap = new Map(ordenadas.map(r => [pairId(r), r]));

  for (let i = 0; i < ordenadas.length; i++) {
    if (usadas.has(i)) continue;

    const p1 = ordenadas[i];
    const p1Id = pairId(p1);
    let rivalIndex = -1;

    // Buscar rival que no haya jugado contra p1
    for (let j = i + 1; j < ordenadas.length; j++) {
      if (usadas.has(j)) continue;
      const p2 = ordenadas[j];
      const p2Id = pairId(p2);
      const key = [p1Id, p2Id].sort().join(" vs ");
      if (!played.has(key)) {
        rivalIndex = j;
        break;
      }
    }

    // Si no hay rival "nuevo", coger el siguiente disponible
    if (rivalIndex === -1) {
      for (let j = i + 1; j < ordenadas.length; j++) {
        if (!usadas.has(j)) {
          rivalIndex = j;
          break;
        }
      }
    }

    if (rivalIndex !== -1) {
      usadas.add(i);
      usadas.add(rivalIndex);
      emparejamientos.push({
        parejaA: ordenadas[i],
        parejaB: ordenadas[rivalIndex]
      });
    }
  }

  return emparejamientos;
}

// Pintar tabla HTML
function renderEmparejamientosTable(emparejamientos) {
  let html = `
    <table border="1">
      <thead>
        <tr>
          <th>Pareja A Maestro</th>
          <th>Pareja A Padawan</th>
          <th>Pareja B Maestro</th>
          <th>Pareja B Padawan</th>
        </tr>
      </thead>
      <tbody>
  `;

  for (const emp of emparejamientos) {
    html += `
      <tr>
        <td>${emp.parejaA.c[0].v}</td>
        <td>${emp.parejaA.c[1].v}</td>
        <td>${emp.parejaB.c[0].v}</td>
        <td>${emp.parejaB.c[1].v}</td>
      </tr>
    `;
  }

  html += `
      </tbody>
    </table>
  `;

  return html;
}

// Ejemplo de uso en tu web
function loadPairings(resultados,rankingSuizo) {
  const emparejamientos = generarEmparejamientos(rankingSuizo, resultados);
  const tablaHtml = renderEmparejamientosTable(emparejamientos);
  document.getElementById("emparejamientos").innerHTML = tablaHtml;
}
