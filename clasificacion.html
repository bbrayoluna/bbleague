			<main>
				<br>
				<a href="jornada7.html" class="hide nuffle red menu">Resumen Jornada 7</a>
				<table id="clasificacion">
				  <thead>
					<tr>
					  <th>#</th>
					  <th>Pareja</th>
					  <th>PJ</th>
					  <th>PG</th>
					  <th>PE</th>
					  <th>PP</th>
					  <th>TD+</th>
					  <th>TD-</th>
					  <th>TD dif</th>
					  <th>Bajas Causadas</th>
					  <th>Bajas Sufridas</th>
					  <th>Puntos</th>
					</tr>
				  </thead>
				  <tbody>
					<script>
					const SHEET_ID = "1O7yVvVJcC2afswIFlYi87J6JCgKaw-Sa18yuRBCoSdI";
					const TABLA_ORDENADA = "TablaOrdenada";

					async function loadClasificacion() {
					  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${TABLA_ORDENADA}`;
					  const res = await fetch(url);
					  const text = await res.text();

					  const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
					  const rows = json.table.rows;

					  const tbody = document.querySelector("#clasificacion tbody");
					  tbody.innerHTML = "";

					  rows.forEach((row, index) => {
						if (!row.c) return;

						const tr = document.createElement("tr");

						// Posición
						const pos = document.createElement("td");
						pos.textContent = index + 1;
						tr.appendChild(pos);

						// Columnas de TablaOrdenada (A=Equipo, B=PJ, C=PG, D=PE, E=PP, F=TD+, G=TD-, H=TD±, I=Puntos)
						const get = (i) => row.c[i] ? row.c[i].v : "";

						const cols = [
						  get(0)+'-'+get(1), // Equipo
						  get(2), // PJ
						  get(3), // PG
						  get(4), // PE
						  get(5), // PP
						  get(6), // TD+
						  get(7), // TD-
						  get(8), // TD±
						  get(9), // Bajas causadas
						  get(10), // Bajas sufridas
						  get(11)  // Puntos
						];

						cols.forEach(v => {
						  const td = document.createElement("td");
						  td.textContent = v;
						  tr.appendChild(td);
						});

						tbody.appendChild(tr);
					  });
					}

					document.addEventListener("DOMContentLoaded", loadClasificacion);
					</script>
				  </tbody>
				</table>
