			<main>
				<br>
				<a href="jornada7.html" class="hide nuffle red menu">Resumen Jornada 7</a>
				<table>
					<thead>
						<tr>
							<th>Entrenador</th>
							<th>Equipo</th>
							<th>Ptos</th>
							<th>Partidos Jugados</th>
							<th>Ganados</th>
							<th>Empatados</th>
							<th>Perdidos</th>
							<th>Touchdowns a favor</th>
							<th>Touchdowns en contra</th>
							<th>Heridos provocados</th>
						</tr>
					</thead>
					<tbody>
						<script>
							const equipos = [
								{"Entrenador": "Sergio", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"},
								{"Entrenador": "Luis", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"},
								{"Entrenador": "Miki", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"},
								{"Entrenador": "Rodri H", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"},
								{"Entrenador": "Raúl", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"},
								{"Entrenador": "Iván", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"},
								{"Entrenador": "Enric", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"},
								{"Entrenador": "Iker", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"},
								{"Entrenador": "Meritxell", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"},
								{"Entrenador": "Josemi", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"},
								{"Entrenador": "Diego", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"},
								{"Entrenador": "Santi", "Equipo": "pending", "Ptos": "0", "Jugados": "0", "Ganados": "0", "Empatados": "0", "Perdidos": "0", "TA": "0", "TC": "0", "HP": "0"}
							];
							equipos.sort((a, b) => {
							  // Primero se ordena por Ptos (de mayor a menor)
							  if (b.Ptos !== a.Ptos) {
								return b.Ptos - a.Ptos;
							  }

							  // Si hay empate en Ptos, se ordena por TA - TC (de mayor a menor)
							  const aDiferencia = a.TA - a.TC;
							  const bDiferencia = b.TA - b.TC;
							  if (bDiferencia !== aDiferencia) {
								return bDiferencia - aDiferencia;
							  }

							  // Si aún hay empate, se ordena por HP (de mayor a menor)
							  return b.HP - a.HP;
							});
							function quitarAcentos(str) {
								return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
							}

							function formatoPDF(str){
								return quitarAcentos(str).toLowerCase().trim();
							}
							equipos.forEach(equipo => {
								document.write(`<tr><td>${equipo.Entrenador}</td><td>Pending</td><td class="hide linktd"><a href="descargas/2026/equipos/${formatoPDF(equipo.Entrenador)}-${formatoPDF(equipo.Equipo)}.pdf" download="${formatoPDF(equipo.Entrenador)}-${formatoPDF(equipo.Equipo)}.pdf">${equipo.Equipo}</a></td>
								<td>${equipo.Ptos}</td><td>${equipo.Jugados}</td><td>${equipo.Ganados}</td><td>${equipo.Empatados}</td>
								<td>${equipo.Perdidos}</td><td>${equipo.TA}</td><td>${equipo.TC}</td><td>${equipo.HP}</td></tr>`);
							});
						</script>
					</tbody>
				</table>
