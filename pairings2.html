    <meta charset="UTF-8">

</head>
<body>
		<header>
			<img src="images/logo.png" class="logosize"  alt="LogoBB">
			<h1>Emparejamientos del Torneo</h1>
			<img src="images/logoliga.png" class="logosize6x6" alt="logoliga">
		</header>
		<div class="container">
			<nav>
				<ul>
				<li><a href="index.html" class="nuffle yellow menu">Principal</a></li>
				<li><a href="reglas.html" class="nuffle yellow menu">Bases</a></li>
				<li><a href="clasificacion.html" class="nuffle yellow menu">Clasificación</a></li>
				<li class="nuffle yellow menu">Emparejamientos</li>
				</ul>
			</nav>
			<main>
				<p class="nuffle red big">
					PENDING
				</p>
				<div id="emparejamientos"></div>
    <h2>Resultados previos</h2>
    <div id="resultados">
      <!-- JS rellenará aquí los resultados por jornada -->
    </div>

    <h2>Próximos emparejamientos (suizo)</h2>
    <table id="pairings">
      <thead>
        <tr>
          <th>Mesa</th>
          <th>Equipo 1</th>
          <th>Equipo 2</th>
        </tr>
      </thead>
      <tbody>
        <!-- JS rellenará aquí los pairings -->
      </tbody>
    </table>
  </div>

  <script>
    const SHEET_ID = "1O7yVvVJcC2afswIFlYi87J6JCgKaw-Sa18yuRBCoSdI";
    const RANKING_SUIZO = "rankingSuizo";
    const RESULTADOS = "Resultados";

    async function fetchSheet(sheetName) {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}`;
      const res = await fetch(url);
      const text = await res.text();
      return JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
    }

async function loadResultados() {
  const json = await fetchSheet(RESULTADOS);
  const rows = json.table.rows;

  const jornadas = {};

  rows.forEach(r => {
    if (!r.c) return;

    const jornada = r.c[1]?.v;   // Columna B
    const equipoA = r.c[2]?.v;   // Columna C
    const equipoB = r.c[3]?.v;   // Columna D
    const tdA = r.c[4]?.v;       // Columna E
    const tdB = r.c[5]?.v;       // Columna F

    if (!jornada) return;

    if (!jornadas[jornada]) jornadas[jornada] = [];
    jornadas[jornada].push({ equipoA, equipoB, tdA, tdB });
  });

  const cont = document.getElementById("resultados");
  cont.innerHTML = "";

  Object.keys(jornadas)
    .sort((a, b) => Number(a) - Number(b))
    .forEach(j => {

      // Cabecera plegable
      const header = document.createElement("div");
      header.className = "jornada-header";
      header.textContent = `Jornada ${j} ▼`;

      // Contenedor plegable
      const contenido = document.createElement("div");
      contenido.className = "jornada-contenido";

      // Tabla de resultados
      const table = document.createElement("table");
      table.innerHTML = `
        <thead>
          <tr>
            <th>Equipo A</th>
            <th>TD</th>
            <th>TD</th>
            <th>Equipo B</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;

      const tbody = table.querySelector("tbody");

      jornadas[j].forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${p.equipoA ?? ""}</td>
          <td>${p.tdA ?? ""}</td>
          <td>${p.tdB ?? ""}</td>
          <td>${p.equipoB ?? ""}</td>
        `;
        tbody.appendChild(tr);
      });

      contenido.appendChild(table);

      // Evento de plegado/desplegado
      header.addEventListener("click", () => {
        const visible = contenido.style.display === "block";
        contenido.style.display = visible ? "none" : "block";
        header.textContent = visible ? `Jornada ${j} ▼` : `Jornada ${j} ▲`;
      });

      cont.appendChild(header);
      cont.appendChild(contenido);
    });
}

    async function loadPairings() {
      const json = await fetchSheet(RANKING_SUIZO);
      const rows = json.table.rows;

      const teams = rows
        .map(r => (r.c && r.c[0] ? r.c[0].v : null))
        .filter(Boolean);

      const tbody = document.querySelector("#pairings tbody");
      tbody.innerHTML = "";

      let mesa = 1;
      for (let i = 0; i < teams.length; i += 2) {
        const team1 = teams[i];
        const team2 = teams[i + 1] || "BYE";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${mesa++}</td>
          <td>${team1}</td>
          <td>${team2}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await loadResultados();
      await loadPairings();
    });
  </script>
</body>
</html>
