    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pairings - League Rayo de Luna</title>
</head>
<body>
		<header>
			<img src="images/logo.png" class="logosize"  alt="LogoBB">
			<h1>Emparejamientos del Torneo</h1>
			<img src="images/logoliga.png" class="logosize6x6" alt="logoliga">
		</header>
		<div class="container">
			<nav>
				<ul>
				<li><a href="index.html" class="nuffle yellow menu">Principal</a></li>
				<li><a href="reglas.html" class="nuffle yellow menu">Bases</a></li>
				<li><a href="clasificacion.html" class="nuffle yellow menu">Clasificación</a></li>
				<li class="nuffle yellow menu">Emparejamientos</li>
				</ul>
			</nav>
			<main>
				<p class="nuffle red big">
					PENDING
				</p>
				<div id="emparejamientos"></div>
				<table id="pairings">
				  <thead>
					<tr>
					  <th>Mesa</th>
					  <th>Equipo 1</th>
					  <th>Equipo 2</th>
					</tr>
				  </thead>
				  <tbody>
					<script>
					const SHEET_ID = "1O7yVvVJcC2afswIFlYi87J6JCgKaw-Sa18yuRBCoSdI";
					const RANKING_SUIZO = "rankingSuizo";

					async function loadPairings() {
					  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${RANKING_SUIZO}`;
					  const res = await fetch(url);
					  const text = await res.text();

					  const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
					  const rows = json.table.rows;

					  // Columna A = Equipo ordenado por ranking suizo
					  const teams = rows
						.map(r => r.c && r.c[0] ? r.c[0].v : null)
						.filter(Boolean);

					  const tbody = document.querySelector("#pairings tbody");
					  tbody.innerHTML = "";

					  let mesa = 1;
					  for (let i = 0; i < teams.length; i += 2) {
						const team1 = teams[i];
						const team2 = teams[i + 1] || "BYE";

						const tr = document.createElement("tr");

						const tdMesa = document.createElement("td");
						tdMesa.textContent = mesa++;
						tr.appendChild(tdMesa);

						const td1 = document.createElement("td");
						td1.textContent = team1;
						tr.appendChild(td1);

						const td2 = document.createElement("td");
						td2.textContent = team2;
						tr.appendChild(td2);

						tbody.appendChild(tr);
					  }
					}

					document.addEventListener("DOMContentLoaded", loadPairings);
					</script>
				  </tbody>
				</table>

			</main>
		</div>

    
</body>
</html>
